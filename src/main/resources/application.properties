spring.application.name=CURD-demo
server.port=8000
spring.datasource.url=jdbc:mysql://localhost:3306/test?characterEncoding=utf-8
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.username=root
spring.datasource.password=123456



mybatis-plus.mapper-locations=classpath*:/mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.swagger-ui.path=/swagger-ui.html
knife4j.enable=true
knife4j.setting.language=zh_cn

spring.data.redis.host=192.168.65.130
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=6000ms
# 开启lettuce连接池
spring.data.redis.lettuce.pool.enabled=true
# 最大连接数
spring.data.redis.lettuce.pool.max-active=8
# 最大空闲连接数
spring.data.redis.lettuce.pool.max-idle=4
# 最大等待时间
spring.data.redis.lettuce.pool.max-wait=1000ms
# 最小空闲连接数
spring.data.redis.lettuce.pool.min-idle=10
# 禁用健康检查
management.health.redis.enabled=false


